<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Baca Komik Online">
    <title>Baca Komik</title>
    <link rel="icon" type="image/png" href="/public/natacode.png">
    <link rel="stylesheet" href="/public/styles.css">
</head>

<body>
    <div id="app">
        <div id="judul-section">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Cari judul..." autocomplete="off">
            </div>
            <div id="manga-grid" class="manga-grid"></div>
        </div>

        <div id="detail-section" class="d-none">
            <div class="detail-header">
                <button id="detail-back" class="nav-btn">← Kembali</button>
            </div>
            <div class="detail-content" id="detail-content"></div>
            <div class="detail-chapters" id="detail-chapters"></div>
        </div>

        <div id="reader-section" class="d-none">
            <div class="reader-topbar">
                <h2 id="reader-title"></h2>
            </div>
            <div class="image-container" id="image-list"></div>
            <button id="scroll-top" class="scroll-top-btn d-none">↑</button>
            <div class="reader-bottombar">
                <button id="back-to-list" class="nav-btn">← Kembali</button>
                <select id="chapter-select" class="chapter-list" title="Chapter List"></select>
                <button id="prev-chapter" class="nav-btn" disabled>Prev</button>
                <span id="page-indicator">0 halaman</span>
                <button id="next-chapter" class="nav-btn" disabled>Next</button>
            </div>
        </div>
    </div>

    <script src="/public/script.js"></script>
</body>

</html>
